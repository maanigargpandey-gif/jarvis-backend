name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Diagnostic and Build
        run: |
          echo "--- DEBUG: File Structure ---"
          ls -R
          echo "-----------------------------"
          
          # यहाँ हम उस फोल्डर में जा रहे हैं जहाँ से बिल्ड करना है
          cd frontend
          
          echo "--- Building APK ---"
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
