name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build APK
        run: |
          # 1. सबसे पहले फोल्डर बनाओ (अगर नहीं है तो)
          mkdir -p frontend/android/app/src/main/kotlin/com/jarvis/godmode/
          
          # 2. फाइल्स को यहाँ से वहां कॉपी करो (बिना किसी cd के पंगे के)
          # अब हम रूट (Root) से कॉपी कर रहे हैं, जो सबसे सेफ तरीका है
          cp android_templates/AndroidManifest.xml frontend/android/app/src/main/AndroidManifest.xml
          cp android_templates/MainActivity.kt frontend/android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          
          # 3. अब बिल्ड शुरू करो
          cd frontend
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
