name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Robust Build with Template Injection
        run: |
          cd frontend
          
          # 1. प्रोजेक्ट स्ट्रक्चर बनाएं (अगर नहीं है तो)
          if [ ! -d "android" ]; then
            flutter create .
          fi
          
          # 2. ये कमांड आपके 'android_templates' से फाइलें उठाकर
          # सीधे 'android' फोल्डर के अंदर पेस्ट कर देगी।
          # यह ऑटोमैटिक है, आपको कुछ मैन्युअली करने की जरूरत नहीं है।
          
          echo "Injecting templates..."
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          
          # यहाँ हम फाइलों को ओवरराइट कर रहे हैं ताकि आपकी सेटिंग्स पक्की हो जाएं
          cp -rf android_templates/* android/
          
          # 3. बिल्ड प्रोसेस
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
