name: Jarvis OS Build Pipeline
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          
      - run: flutter pub get
      
      # THE MAGIC FIX: Bypass Flutter CLI and use Native Android Gradle
      - name: Build Fat APK using Native Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      # Upload the APK directly from Android's core output folder
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
          
