name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create and Build APK
        run: |
          cd frontend
          flutter create .
          
          echo "--- APPLYING BULLETPROOF SDK FIX ---"
          # यह कमांड्स हर तरह के compileSdk और minSdk को ढूँढकर फोर्सफुली अपडेट कर देंगी
          sed -i -e 's/compileSdk.*/compileSdk 34/' android/app/build.gradle
          sed -i -e 's/compileSdkVersion.*/compileSdkVersion 34/' android/app/build.gradle
          sed -i -e 's/targetSdk.*/targetSdk 34/' android/app/build.gradle
          sed -i -e 's/targetSdkVersion.*/targetSdkVersion 34/' android/app/build.gradle
          sed -i -e 's/minSdk.*/minSdk 21/' android/app/build.gradle
          sed -i -e 's/minSdkVersion.*/minSdkVersion 21/' android/app/build.gradle
          echo "--- SDK FIX APPLIED ---"
          
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
