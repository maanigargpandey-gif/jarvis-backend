name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK (The Final Way)
        run: |
          cd frontend
          
          # 1. पुराना करप्ट एंड्रॉइड फोल्डर उड़ा दो
          rm -rf android
          
          # 2. नया प्रोजेक्ट स्ट्रक्चर बनाओ जो फ्लटर के लेटेस्ट वर्ज़न को सपोर्ट करे (यह एरर को जड़ से खत्म कर देगा)
          flutter create .
          
          # 3. अब अपनी कस्टम फाइलें नए फोल्डर में डालो
          # ये फाइलें अब गिटहब रिपो के रूट पर हैं, इसलिए ../ का पाथ सही काम करेगा
          cp ../AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp ../MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          
          # 4. बिल्ड करो
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
