name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate and Patch Android Build
        run: |
          cd frontend
          
          # 1. सबसे पहले एंड्रॉइड फोल्डर बना रहे हैं (क्योंकि वह गिटहब पर नहीं है)
          flutter create --platforms=android .
          
          # 2. सारी डिपेंडेंसीज़ डाउनलोड कर रहे हैं
          flutter pub get
          
          # 3. फोल्डर बनने के बाद, Jetifier इनेबल कर रहे हैं ताकि प्लगइन्स क्रैश न हों
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. सिर्फ वेरिएबल हटाकर '34' और '21' लिख रहे हैं (फाइल सुरक्षित रहेगी)
          sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle.kts
          sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle.kts
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts

      - name: Compile Final APK
        run: |
          cd frontend
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
