name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK (The Nuclear Way - Final)
        run: |
          cd frontend
          
          # 1. एक नया फ्रेश प्रोजेक्ट बनाएं
          flutter create new_app
          
          # 2. अपने असली कोड (lib, pubspec) को इस फ्रेश प्रोजेक्ट में कॉपी करें
          cp -r lib/* new_app/lib/
          cp pubspec.yaml new_app/pubspec.yaml
          
          # 3. फाइल्स को सीधे android_templates से new_app के अंदर कॉपी करें
          # अब हम फोल्डर के अंदर नहीं घुस रहे, इसलिए पाथ एरर नहीं आएगा
          mkdir -p new_app/android/app/src/main/kotlin/com/jarvis/godmode/
          cp -f android_templates/AndroidManifest.xml new_app/android/app/src/main/AndroidManifest.xml
          cp -f android_templates/MainActivity.kt new_app/android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          cp -f android_templates/build.gradle new_app/android/app/build.gradle
          cp -f android_templates/gradle.properties new_app/gradle.properties
          
          # 4. अब new_app में जाकर बिल्ड करें
          cd new_app
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/new_app/build/app/outputs/flutter-apk/app-release.apk
