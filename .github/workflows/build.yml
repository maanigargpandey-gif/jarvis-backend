name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Android Project
        run: |
          cd frontend
          flutter pub get
          # सुनिश्चित करें कि एंड्रॉइड प्रोजेक्ट के मेटाडाटा अपडेट हों
          flutter create .

      - name: Apply SDK Patches
        run: |
          # यह कमांड्स हर उस फाइल को लक्षित करती हैं जो एंड्रॉइड कॉन्फ़िगरेशन तय करती है
          # .gradle या .kts दोनों के लिए 'compileSdk' और 'minSdk' को फोर्स-सेट करना
          find frontend/android -name "build.gradle*" -exec sed -i -e 's/compileSdk[ ]*=[ ]*[0-9]*/compileSdk = 34/g' {} +
          find frontend/android -name "build.gradle*" -exec sed -i -e 's/compileSdk[ ]*[0-9]*/compileSdk 34/g' {} +
          find frontend/android -name "build.gradle*" -exec sed -i -e 's/minSdk[ ]*=[ ]*[0-9]*/minSdk = 21/g' {} +
          find frontend/android -name "build.gradle*" -exec sed -i -e 's/minSdk[ ]*[0-9]*/minSdk 21/g' {} +
          find frontend/android -name "build.gradle*" -exec sed -i -e 's/targetSdk[ ]*=[ ]*[0-9]*/targetSdk = 34/g' {} +
          find frontend/android -name "build.gradle*" -exec sed -i -e 's/targetSdk[ ]*[0-9]*/targetSdk 34/g' {} +

      - name: Build Release APK
        run: |
          cd frontend
          flutter build apk --release --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
