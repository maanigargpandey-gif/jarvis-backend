name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force SDK 34 and Build
        run: |
          cd frontend
          # 1. सीधे gradle.properties में वर्जन लॉक करना (यह सबसे सॉलिड तरीका है)
          echo "org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64" > android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 2. सभी सब-मॉड्यूल्स को SDK 34 पर फोर्स करना
          find android -name "build.gradle" -exec sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' {} +
          find android -name "build.gradle" -exec sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' {} +
          find android -name "build.gradle" -exec sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' {} +
          
          # 3. क्लीन और बिल्ड
          flutter pub get
          flutter build apk --release
          
