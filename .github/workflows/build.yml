name: Jarvis OS Build Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # 2026 Standard

      - name: Setup Java
        uses: actions/setup-java@v4 # Upgraded to v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # Updated for 2026 stability

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # Crucial: Must be v4
        with:
          name: jarvis-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
