name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Android Project and Force SDK 36
        run: |
          cd frontend
          
          # 1. एंड्रोइड फोल्डर बनाना
          flutter create --platforms=android .
          
          # 2. डिपेंडेंसीज डाउनलोड करना
          flutter pub get
          
          # 3. Jetifier इनेबल करना
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. मुख्य ऐप के SDK को 36 करना
          sed -i 's/flutter.compileSdkVersion/36/g' android/app/build.gradle.kts
          sed -i 's/flutter.targetSdkVersion/36/g' android/app/build.gradle.kts
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts
          
          # 5. सभी सब-प्रोजेक्ट्स और प्लगइन्स (जैसे battery_plus) पर SDK 36 लागू करना
          if [ -f android/build.gradle ]; then
            echo "subprojects {" >> android/build.gradle
            echo "    afterEvaluate { project ->" >> android/build.gradle
            echo "        if (project.hasProperty('android')) {" >> android/build.gradle
            echo "            project.android {" >> android/build.gradle
            echo "                compileSdkVersion = 36" >> android/build.gradle
            echo "            }" >> android/build.gradle
            echo "        }" >> android/build.gradle
            echo "    }" >> android/build.gradle
            echo "}" >> android/build.gradle
          fi

          if [ -f android/build.gradle.kts ]; then
            echo "subprojects {" >> android/build.gradle.kts
            echo "    afterEvaluate {" >> android/build.gradle.kts
            echo "        if (project.hasProperty(\"android\")) {" >> android/build.gradle.kts
            echo "            val android = project.extensions.getByName(\"android\")" >> android/build.gradle.kts
            echo "            android.setProperty(\"compileSdkVersion\", 36)" >> android/build.gradle.kts
            echo "        }" >> android/build.gradle.kts
            echo "    }" >> android/build.gradle.kts
            echo "}" >> android/build.gradle.kts
          fi

      - name: Compile Final APK
        run: |
          cd frontend
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
