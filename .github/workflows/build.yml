name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK (Final Fix)
        run: |
          cd frontend
          
          # 1. नया प्रोजेक्ट स्ट्रक्चर बनाएं (चूंकि एंड्रॉइड फोल्डर नहीं है, यह काम करेगा)
          flutter create .
          
          # 2. अब फाइलें 'android_templates' से उठाकर एंड्रॉइड फोल्डर में डालें
          # पाथ को फिक्स कर दिया है: अब ../ का इस्तेमाल नहीं है
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          
          cp -f android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp -f android_templates/MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          cp -f android_templates/build.gradle android/app/build.gradle
          cp -f android_templates/gradle.properties android/gradle.properties
          
          # 3. बिल्ड करें
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
