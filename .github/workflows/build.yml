name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build and Package
        run: |
          # हर कमांड से पहले फोल्डर के अंदर जाओ
          cd frontend
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          # पाथ अब बिल्कुल सही है, क्योंकि हमने frontend के अंदर बिल्ड किया है
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
