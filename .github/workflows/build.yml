name: Build Jarvis APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create App and Build APK
        run: |
          flutter create jarvis_app
          cp frontend/lib/main.dart jarvis_app/lib/main.dart
          cd jarvis_app
          flutter pub add http
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: jarvis_app/build/app/outputs/flutter-apk/app-release.apk
          
