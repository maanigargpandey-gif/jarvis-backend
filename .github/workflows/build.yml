      - name: Configure Android SDK 36 and Force on Subprojects
        run: |
          # 1. मुख्य ऐप के SDK को 36 करना (जो आप पहले से कर रहे थे)
          sed -i 's/flutter.compileSdkVersion/36/g' android/app/build.gradle.kts
          sed -i 's/flutter.targetSdkVersion/36/g' android/app/build.gradle.kts
          
          # 2. सभी सब-प्रोजेक्ट्स और प्लगइन्स (जैसे battery_plus) को भी SDK 36 पर मजबूर करना
          # अगर रूट फाइल Groovy (.gradle) है:
          if [ -f android/build.gradle ]; then
            cat << 'EOF' >> android/build.gradle
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion = 36
                      }
                  }
              }
          }
          EOF
          fi

          # अगर रूट फाइल Kotlin DSL (.gradle.kts) है:
          if [ -f android/build.gradle.kts ]; then
            cat << 'EOF' >> android/build.gradle.kts
          subprojects {
              afterEvaluate {
                  if (project.hasProperty("android")) {
                      val android = project.extensions.getByName("android")
                      android.setProperty("compileSdkVersion", 36)
                  }
              }
          }
          EOF
          fi
          
