name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean Build
        run: |
          cd frontend
          # 1. पुराना एंड्रॉइड स्ट्रक्चर पूरी तरह साफ़ करें
          rm -rf android
          # 2. नया एंड्रॉइड स्ट्रक्चर v2 एंबेडिंग के साथ जनरेट करें
          flutter create --platforms=android .
          # 3. डिपेंडेंसीज डाउनलोड करें
          flutter pub get
          
          # 4. फाइनल बिल्ड
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
