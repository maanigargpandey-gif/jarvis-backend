name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fresh Build Process
        run: |
          cd frontend
          
          # 1. पुराना करप्ट एंड्रॉइड फोल्डर उड़ा दें ताकि कोई एरर न आए
          rm -rf android
          
          # 2. नया, फ्रेश प्रोजेक्ट स्ट्रक्चर बनाएं जो आज के फ्लटर वर्ज़न को सपोर्ट करे
          flutter create --platforms=android .
          
          # 3. अब अपनी जरूरी फाइलों को नए फोल्डर में इंजेक्ट करें
          # ये फाइलें 'android_templates' से उठाई जाएंगी
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          cp android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android_templates/MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          
          # 4. बिल्ड चलाएं
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
