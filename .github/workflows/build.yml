name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Rebuild Android Infrastructure
        run: |
          cd frontend
          # पुरानी एंड्रॉइड फाइल्स को जड़ से उखाड़ रहे हैं
          rm -rf android
          # अब लेटेस्ट स्ट्रक्चर के साथ नया एंड्रॉइड फोल्डर बना रहे हैं
          flutter create --platforms=android .
          
      - name: Build APK
        run: |
          cd frontend
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
