name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean & Build APK
        run: |
          cd frontend
          
          # 1. पूरी तरह क्लीन स्लेट (सबसे ज्यादा जरूरी)
          rm -rf android
          rm -rf .gradle
          rm -rf .idea
          rm -f local.properties
          
          # 2. नया प्रोजेक्ट क्रिएट करें
          flutter create .
          
          # 3. परमिशन और ग्रेडिल फाइलें डालें
          # हम एक-एक करके फाइलें डाल रहे हैं ताकि कोई पाथ एरर न हो
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          cp -f ../android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp -f ../android_templates/MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          cp -f ../android_templates/build.gradle android/app/build.gradle
          cp -f ../android_templates/gradle.properties android/gradle.properties
          
          # 4. बिल्ड करने से पहले डिपेंडेंसीज़ पक्की करें
          flutter pub get
          
          # 5. APK बिल्ड
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
