name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Full Clean and Guaranteed Build
        run: |
          cd frontend
          
          # 1. पुराना कचरा और लॉक फाइल हटाना (यह सबसे अहम स्टेप है)
          rm -rf android
          rm -f pubspec.lock
          
          # 2. नया एंड्रॉइड फोल्डर बनाना
          flutter create --platforms=android .
          
          # 3. प्लगइन्स को अपग्रेड करना (इससे battery_plus और geolocator खुद SDK 36 पर आ जाएंगे, कोई फीचर नहीं हटेगा)
          flutter pub upgrade
          
          # 4. ऐप को सुरक्षित तरीके से SDK 36 पर फिक्स करना
          sed -i 's/flutter.compileSdkVersion/36/g' android/app/build.gradle.kts || true
          sed -i 's/flutter.targetSdkVersion/36/g' android/app/build.gradle.kts || true
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle.kts || true
          
          # 5. Jetifier चालू करना
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 6. फाइनल बिल्ड
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
