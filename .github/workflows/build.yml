name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Final Robust Build
        run: |
          cd frontend
          
          # 1. सिर्फ तभी प्रोजेक्ट बनाएँ अगर एंड्रॉइड फोल्डर मौजूद न हो
          if [ ! -d "android" ]; then
            echo "Project structure missing. Creating..."
            flutter create .
          else
            echo "Project structure exists. Skipping creation."
          fi
          
          # 2. टेम्पलेट्स को सुरक्षित पेस्ट करें (परमिशन्स और सेटिंग्स को ओवरराइट करेंगे)
          # यह आपके द्वारा सेट की गई परमिशन्स को बरकरार रखेगा
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          
          echo "Applying your custom templates..."
          cp -f android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp -f android_templates/MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          cp -f android_templates/build.gradle android/app/build.gradle
          cp -f android_templates/gradle.properties android/gradle.properties
          
          # 3. बिल्ड प्रोसेस
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
