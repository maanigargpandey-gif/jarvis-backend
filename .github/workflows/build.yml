name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Final Build APK
        run: |
          cd frontend
          
          # 1. पुराना सब कुछ उड़ाओ ताकि कोई कन्फ्यूजन न हो
          rm -rf android
          
          # 2. नया एंड्रॉइड फोल्डर बनाओ
          flutter create --platforms=android .
          
          # 3. फाइलों को सीधे ओवरराइट करो (कोई sed नहीं, कोई एडिटिंग नहीं)
          # हम अपने टेम्पलेट्स को सीधे नई फाइलों के ऊपर कॉपी कर रहे हैं
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          cp android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android_templates/MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          cp android_templates/build.gradle android/app/build.gradle
          cp android_templates/gradle.properties android/gradle.properties
          
          # 4. बिल्ड करो
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
