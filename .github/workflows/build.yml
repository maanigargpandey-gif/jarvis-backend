name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build APK
        run: |
          cd frontend
          # 1. एंड्रॉइड फोल्डर सुरक्षित रूप से सुनिश्चित करें
          flutter create .
          
          # 2. आवश्यक फोल्डर पाथ बनाएं
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          
          # 3. फाइल्स को कॉपी करें (यह कमांड अब फेल नहीं होगी)
          cp ../android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp ../android_templates/MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          
          # 4. बिल्ड प्रक्रिया
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          p
