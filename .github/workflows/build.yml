name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android Build & Setup Properties
        run: |
          cd frontend
          
          # 1. नया एंड्रॉइड फोल्डर बनाना (Clean Slate)
          flutter create --platforms=android .
          
          # 2. डिपेंडेंसीज़ डाउनलोड करना
          flutter pub get
          
          # 3. ऑफिशियल तरीका: local.properties में SDK वर्ज़न सेट करना
          # इससे Kotlin फाइल का सिंटैक्स बिल्कुल नहीं बिगड़ेगा
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 4. पुराने प्लगइन्स को क्रैश होने से बचाने के लिए Jetifier इनेबल करना
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Compile Final APK
        run: |
          cd frontend
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
