name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build and Patch APK
        run: |
          cd frontend
          flutter create .
          
          # यहाँ हम build.gradle.kts को ही नया लिख रहे हैं, कोई छेड़छाड़ नहीं होगी
          echo 'android {
              compileSdk = 34
              namespace = "com.example.jarvis_godmode"
              defaultConfig {
                  applicationId = "com.example.jarvis_godmode"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
          }' > android/app/build.gradle.kts
          
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
