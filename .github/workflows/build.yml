name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Final Build APK
        run: |
          cd frontend
          
          # 1. पुराना एंड्रॉइड फोल्डर हटाएं
          rm -rf android
          
          # 2. नया प्रोजेक्ट स्ट्रक्चर बनाएं
          flutter create .
          
          # 3. फाइलें 'templates' फोल्डर से उठाएं (यह पाथ 100% सही है)
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          cp templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp templates/MainActivity.kt android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
          
          # 4. Gradle फाइल को ऑटो-फिक्स करें
          sed -i '/android {/a \    namespace "com.jarvis.godmode"' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          
          # 5. बिल्ड करें
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
