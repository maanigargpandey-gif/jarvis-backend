name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: The Tactical Nuke Build (Forcing Plugins)
        run: |
          cd frontend
          
          # 1. अपना घर साफ़ करना
          rm -rf android
          flutter create --platforms=android .
          
          # 2. सारे प्लगइन्स (जान) को डाउनलोड करना
          flutter pub get
          
          # 3. THE TACTICAL NUKE (असली हैक)
          # गिटहब के हिडन फोल्डर में घुसकर प्लगइन्स के हार्डकोडेड '33' को '34' में बदलना
          echo "--- Hacking Pub Cache to force SDK 34 on all plugins ---"
          find /opt/hostedtoolcache ~/.pub-cache -type f -name "build.gradle" -exec sed -i 's/compileSdkVersion 31/compileSdkVersion 34/g' {} + 2>/dev/null || true
          find /opt/hostedtoolcache ~/.pub-cache -type f -name "build.gradle" -exec sed -i 's/compileSdkVersion 32/compileSdkVersion 34/g' {} + 2>/dev/null || true
          find /opt/hostedtoolcache ~/.pub-cache -type f -name "build.gradle" -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' {} + 2>/dev/null || true
          
          # कोटलिन फाइल्स के लिए भी सेम हैक
          find /opt/hostedtoolcache ~/.pub-cache -type f -name "build.gradle.kts" -exec sed -i 's/compileSdk = 31/compileSdk = 34/g' {} + 2>/dev/null || true
          find /opt/hostedtoolcache ~/.pub-cache -type f -name "build.gradle.kts" -exec sed -i 's/compileSdk = 32/compileSdk = 34/g' {} + 2>/dev/null || true
          find /opt/hostedtoolcache ~/.pub-cache -type f -name "build.gradle.kts" -exec sed -i 's/compileSdk = 33/compileSdk = 34/g' {} + 2>/dev/null || true
          
          # 4. अपने मेन ऐप को सुरक्षित और बिना एरर के 34 देना
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # 5. पुराने प्लगइन्स को नए सिस्टम में ढालने के लिए Jetifier इनेबल करना
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 6. फाइनल बिल्ड (अब कोई प्लगइन 33 पर नहीं अड़ेगा)
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
