name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java & Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: The Final Nuclear Build
        run: |
          cd frontend
          # 1. कचरा हटाओ
          rm -rf android
          # 2. नया फोल्डर बनाओ
          flutter create --platforms=android .
          
          # 3. AndroidManifest.xml को इंजेक्ट करो (परमिशंस + v2 एंबेडिंग)
          cat <<EOF > android/app/src/main/AndroidManifest.xml
<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.jarvis.godmode">
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
    <uses-permission android:name="android.permission.WAKE_LOCK" />
    <uses-permission android:name="android.permission.RECORD_AUDIO" />
    <uses-permission android:name="android.permission.CAMERA" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
    <application android:label="JARVIS" android:name="\${applicationName}" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
        <activity android:name=".MainActivity" android:exported="true" android:theme="@style/LaunchTheme" android:hardwareAccelerated="true" android:launchMode="singleTop" android:windowSoftInputMode="adjustResize">
            <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
        <meta-data android:name="flutterEmbedding" android:value="2" />
        <service android:name="com.jarvis.godmode.JarvisService" android:foregroundServiceType="mediaPlayback|microphone" android:exported="false" />
    </application>
</manifest>
EOF

          # 4. MainActivity.kt को इंजेक्ट करो
          mkdir -p android/app/src/main/kotlin/com/jarvis/godmode/
          cat <<EOF > android/app/src/main/kotlin/com/jarvis/godmode/MainActivity.kt
package com.jarvis.godmode
import io.flutter.embedding.android.FlutterActivity
class MainActivity: FlutterActivity() {}
EOF

          # 5. फाइनल बिल्ड
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-GodMode-APK
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          
