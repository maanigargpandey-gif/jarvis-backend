name: Build Jarvis APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create App Skeleton & Build APK
        run: |
          # 1. नया ऐप का ढांचा बनाओ
          flutter create jarvis_app
          
          # 2. हमारा बनाया हुआ कोड इस नए ऐप में डालो
          cp frontend/lib/main.dart jarvis_app/lib/main.dart
          
          # 3. नए ऐप के अंदर जाओ और HTTP पैकेज डालो (जार्विस को इंटरनेट से जोड़ने के लिए)
          cd jarvis_app
          flutter pub add http
          
          # 4. अब फाइनल APK बनाओ
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Jarvis-GodMode-APK
          path: jarvis_app/build/app/outputs/flutter-apk/app-release.apk
          
