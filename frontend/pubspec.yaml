name: zarvish_frontend
description: Zarvish 4.0 - God-Mode AI Operating System
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 1. State Management (Omni-UI के लिए)
  provider: ^6.1.1
  
  # 2. Backend Connectivity (FastAPI से जुड़ने के लिए)
  http: ^1.2.0
  
  # 3. God-Mode Security (MFA, Face-Lock & Fingerprint)
  local_auth: ^2.1.8
  shared_preferences: ^2.2.2
  
  # 4. Nexus Vault & Media Studio (फाइल और फोटो अपलोड)
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  
  # 5. Cyber Cash Browser (इन-ऐप सिक्योर्ड ब्राउज़र के लिए)
  webview_flutter: ^4.4.2
  
  # 6. UI Enhancements (साइबरपंक लुक के लिए)
  google_fonts: ^6.1.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  
