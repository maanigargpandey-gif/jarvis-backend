name: zarvish_os
description: Self-Evolving AI Operating System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^6.1.0
  animated_bottom_navigation_bar: ^1.3.3
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  google_nav_bar: ^5.0.6
  liquid_pull_to_refresh: ^3.0.1
  flutter_tts: ^3.8.3
  speech_to_text: ^6.5.1
  permission_handler: ^11.2.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  lottie: ^2.7.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    
