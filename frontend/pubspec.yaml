name: zarvish_os
description: Self-Evolving AI Operating System for Mani Pandey
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  # State Management & UI
  provider: ^6.1.2
  google_fonts: ^6.2.1
  animated_bottom_navigation_bar: ^1.3.3
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  google_nav_bar: ^5.0.6
  liquid_pull_to_refresh: ^3.0.1
  lottie: ^3.1.0
  
  # AI Core & Hardware Permissions
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0
  
  # Utilities & Backend Connection
  share_plus: ^7.2.2
  url_launcher: ^6.2.5
  http: ^1.2.0      # <--- (CRITICAL) यह मिसिंग था, अब ऐड कर दिया गया है!

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    
