name: zarvish_os
description: Self-Evolving AI Operating System for Mani Pandey
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & UI
  provider: ^6.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  
  # AI Core & Hardware
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0
  
  # Utilities
  http: ^1.2.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.0
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    
